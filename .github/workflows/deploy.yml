# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Deploy to DigitalOcean
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_IP: "${{ secrets.SERVER_IP }}"
      SSH_USERNAME: "${{ secrets.SSH_USERNAME }}"
      SSH_PRIVATE_KEY: "${{ secrets.SSH_PRIVATE_KEY }}"
    steps:
      - name: Check deploy secrets
        id: check_secrets
        run: |
          echo "Checking SSH deploy secrets..."
          if [ -z "$SERVER_IP" ] || [ -z "$SSH_USERNAME" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "secrets_present=false" >> $GITHUB_OUTPUT
          else
            echo "secrets_present=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Server
        if: "${{ steps.check_secrets.outputs.secrets_present == 'true' }}"
        uses: appleboy/ssh-action@master
        with:
          host: "${{ env.SERVER_IP }}"
          username: "${{ env.SSH_USERNAME }}"
          key: "${{ env.SSH_PRIVATE_KEY }}"
          script: |
            cd /var/www/school-pack-tracker

            # Stash any local changes that shouldn't be tracked (just in case)
            git stash

            # Pull latest changes from main
            git pull origin main

            # Deploy Backend
            echo "Building backend..."
            cd Backend
            npm install

            # Start or Restart PM2 Process
            pm2 describe backend-api > /dev/null
            if [ $? -eq 0 ]; then
                pm2 restart backend-api
            else
                pm2 start server.js --name "backend-api"
            fi

            # Save PM2 process list to auto-start on server reboot
            pm2 save

            # Deploy Frontend
            echo "Building frontend..."
            cd ..
            npm install
            npm run build

            echo "Deployment Complete!"

      - name: Skip server deploy (missing secrets)
        if: "${{ steps.check_secrets.outputs.secrets_present != 'true' }}"
        run: |
          echo "--------------------------------------------------"
          echo "Skipping SSH deploy: one or more secrets are missing."
          echo "Please add these repository secrets: SERVER_IP, SSH_USERNAME, SSH_PRIVATE_KEY"
          echo "Repo settings → Settings → Secrets and variables → Actions -> New repository secret"
          echo "--------------------------------------------------"
